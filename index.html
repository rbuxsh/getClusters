<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECS Facilities Hire Request</title>

<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #f1f1f1;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 1100px;
  margin: auto;
  background: #fff;
  padding: 24px;
  border-radius: 8px;
}

h1 { color: #005EB8; }

fieldset {
  border: none;
  margin-top: 32px;
  padding: 0;
}

legend {
  font-weight: 700;
  margin-bottom: 12px;
}

select {
  width: 100%;
  padding: 12px;
  font-size: 16px;
}

.section {
  display: none;
  margin-top: 24px;
  padding: 16px;
  border-left: 4px solid #005EB8;
  background: #f9fafb;
}

/* FACILITY TILES */
.tiles {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.tile {
  border: 2px solid #ccc;
  border-radius: 8px;
  padding: 16px;
  cursor: pointer;
  background: #fff;
}

.tile.selected {
  border-color: #005EB8;
  background: #e8f1fb;
}

.tile h3 { margin: 0 0 8px; }
.tile .rate { font-weight: bold; color: #005EB8; }

.tile input { display: none; }

button {
  margin-top: 32px;
  padding: 16px;
  width: 100%;
  background: #005EB8;
  color: white;
  border: none;
  font-size: 18px;
}

/* BOOKING */
.booking-slot {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr auto;
  gap: 12px;
  padding: 12px;
  background: #f7f7f7;
  border-radius: 8px;
  margin-bottom: 12px;
}

.booking-slot button {
  background: none;
  border: none;
  color: #c00000;
  cursor: pointer;
  font-weight: bold;
}

.empty-message {
  padding: 12px;
  background: #dff6ff;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
<h1>ECS Facilities Hire Request</h1>

<!-- CLUSTER -->
<fieldset>
  <legend>Cluster / Area</legend>
  <select id="clusterSelect">
    <option value="">Cluster Loading…</option>
  </select>
</fieldset>

<!-- SCHOOL -->
<div id="schoolSection" class="section">
  <fieldset>
    <legend>Establishment</legend>
    <select id="schoolSelect">
      <option value="">School Loading…</option>
    </select>
  </fieldset>
</div>

<!-- FACILITIES -->
<div id="facilitySection" class="section">
  <fieldset>
    <legend>Facilities Available</legend>
    <div id="facilityTiles" class="tiles"></div>
  </fieldset>

  <!-- BOOKING SECTION (NEW, UNDER FACILITIES) -->
  <div id="bookingSection" class="section">
    <h2>Time Slots</h2>
    <div id="bookingFacilityName"></div>

    <div id="bookingSlots">
      <p class="empty-message">
        No time slots added. Click “Add another time slot” below.
      </p>
    </div>

    <button type="button" id="addBookingSlotBtn">
      + Add another time slot
    </button>
  </div>
</div>

<button type="submit">Submit Application</button>
</div>

<script>
/* =====================================================
   YOUR EXISTING CODE — COPIED VERBATIM (UNCHANGED)
   ===================================================== */

const FLOW_URL = "https://defaultfed993064d2d4409959dd0edb7304a.0b.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4cd48f8af3c54031bbd48566882f743e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=K1MDVTz9REAxJjsPeW9JqZnCFw2jR-6IaFXtqOwnSWA";

/* ================= LOAD CLUSTERS ================= */
async function loadClusters() {
  const res = await fetch(FLOW_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "getClusters" })
  });

  const data = await res.json();
  const select = document.getElementById("clusterSelect");

  let clusters = data.clusters || data;
  if (!Array.isArray(clusters)) clusters = [];

  clusters.sort((a, b) => {
    const nameA = typeof a === "string" ? a : a?.cluster || "";
    const nameB = typeof b === "string" ? b : b?.cluster || "";
    return nameA.localeCompare(nameB);
  });

  select.innerHTML = `<option value="">Select cluster</option>`;
  clusters.forEach(item => {
    const clusterName = typeof item === "string" ? item : item?.cluster;
    if (!clusterName || clusterName === "#N/A") return;
    select.innerHTML += `<option value="${clusterName}">${clusterName}</option>`;
  });
}

/* ================= LOAD SCHOOLS ================= */
async function loadSchools(cluster) {
  const res = await fetch(FLOW_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "getSchools", cluster })
  });

  const data = await res.json();
  const select = document.getElementById("schoolSelect");

  data.schools.sort((a, b) => a.schools.localeCompare(b.schools));
  select.innerHTML = `<option value="">Select establishment</option>`;
  data.schools.forEach(s => {
    select.innerHTML += `<option value="${s.schools}">${s.schools}</option>`;
  });

  document.getElementById("schoolSection").style.display = "block";
}

/* ================= LOAD FACILITIES ================= */
async function loadFacilities(cluster, school) {
  const res = await fetch(FLOW_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "getFacilities", cluster, school })
  });

  const data = await res.json();
  const container = document.getElementById("facilityTiles");
  container.innerHTML = "";

  data.facilities.forEach(f => {
    const tile = document.createElement("label");
    tile.className = "tile";
    tile.innerHTML = `
      <input type="checkbox" value="${f.facility}">
      <h3>${f.facility}</h3>
      <div class="rate">£${f.rate} / hour</div>
    `;

    tile.addEventListener("click", () => {
      const cb = tile.querySelector("input");
      cb.checked = !cb.checked;
      tile.classList.toggle("selected", cb.checked);
    });

    container.appendChild(tile);
  });

  document.getElementById("facilitySection").style.display = "block";
}

/* ================= EVENTS ================= */
document.getElementById("clusterSelect").addEventListener("change", e => {
  document.getElementById("schoolSection").style.display = "none";
  document.getElementById("facilitySection").style.display = "none";
  if (e.target.value) loadSchools(e.target.value);
});

document.getElementById("schoolSelect").addEventListener("change", e => {
  document.getElementById("facilitySection").style.display = "none";
  if (e.target.value) {
    loadFacilities(
      document.getElementById("clusterSelect").value,
      e.target.value
    );
  }
});

/* INIT */
loadClusters();

/* =====================================================
   BOOKING FUNCTIONALITY — ADDED ONLY
   ===================================================== */

const facilityBookings = {};
let activeFacility = null;

document.addEventListener("click", e => {
  const tile = e.target.closest(".tile");
  if (!tile) return;

  const name = tile.querySelector("h3")?.innerText;
  if (!name) return;

  if (!tile.classList.contains("selected")) {
    activeFacility = null;
    document.getElementById("bookingSection").style.display = "none";
    return;
  }

  activeFacility = name;
  if (!facilityBookings[name]) facilityBookings[name] = [];

  renderBooking();
});

function renderBooking() {
  const section = document.getElementById("bookingSection");
  const title = document.getElementById("bookingFacilityName");
  const slotsDiv = document.getElementById("bookingSlots");

  section.style.display = "block";
  title.innerHTML = `<strong>Facility:</strong> ${activeFacility}`;
  slotsDiv.innerHTML = "";

  const slots = facilityBookings[activeFacility];

  if (slots.length === 0) {
    slotsDiv.innerHTML = `
      <p class="empty-message">
        No time slots added. Click “Add another time slot” below.
      </p>`;
    return;
  }

  slots.forEach((s, i) => {
    const row = document.createElement("div");
    row.className = "booking-slot";
    row.innerHTML = `
      <div>From: ${s.fromDate} ${s.fromTime}</div>
      <div>To: ${s.toDate} ${s.toTime}</div>
      <button type="button">🗑</button>
    `;
    row.querySelector("button").onclick = () => {
      slots.splice(i, 1);
      renderBooking();
    };
    slotsDiv.appendChild(row);
  });
}

document.getElementById("addBookingSlotBtn").addEventListener("click", () => {
  if (!activeFacility) return;

  const fromDate = prompt("Start date (YYYY-MM-DD)");
  const fromTime = prompt("Start time (HH:MM)");
  const toDate = prompt("End date (YYYY-MM-DD)");
  const toTime = prompt("End time (HH:MM)");

  if (!fromDate || !fromTime || !toDate || !toTime) return;

  facilityBookings[activeFacility].push({
    fromDate, fromTime, toDate, toTime
  });

  renderBooking();
});
</script>

</body>
</html>
