<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECS Facilities Hire Request</title>

<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #f1f1f1;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 1100px;
  margin: auto;
  background: #fff;
  padding: 24px;
  border-radius: 8px;
}

h1 { color: #005EB8; }

fieldset {
  border: none;
  margin-top: 32px;
  padding: 0;
}

legend {
  font-weight: 700;
  margin-bottom: 12px;
}

select {
  width: 100%;
  padding: 12px;
  font-size: 16px;
}

.section {
  display: none;
  margin-top: 24px;
  padding: 16px;
  border-left: 4px solid #005EB8;
  background: #f9fafb;
}

/* FACILITY TILES */
.tiles {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.tile {
  border: 2px solid #ccc;
  border-radius: 8px;
  padding: 16px;
  cursor: pointer;
  background: #fff;
}

.tile.selected {
  border-color: #005EB8;
  background: #e8f1fb;
}

.tile h3 { margin: 0 0 8px; }
.tile .rate { font-weight: bold; color: #005EB8; }

.tile input { display: none; }

button {
  margin-top: 32px;
  padding: 16px;
  width: 100%;
  background: #005EB8;
  color: white;
  border: none;
  font-size: 18px;
}
  .timeslots {
  margin-top: 12px;
  padding: 12px;
  border: 1px dashed #ccc;
  background: #fafafa;
}

.timeslot {
  display: grid;
  grid-template-columns: repeat(4, 1fr) auto;
  gap: 8px;
  margin-bottom: 8px;
}

.timeslot input {
  padding: 6px;
  font-size: 14px;
}

.timeslot button {
  background: #d4351c;
  color: #fff;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
}

.add-slot {
  margin-top: 8px;
  background: #005EB8;
  color: #fff;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
}
  #timeSlotsSection {
  margin-top: 32px;
}

.timeslot-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr auto;
  gap: 12px;
  padding: 12px;
  background: #f7f7f7;
  border-radius: 8px;
  margin-bottom: 12px;
}

.timeslot-row button {
  background: none;
  border: none;
  color: #c00000;
  cursor: pointer;
  font-weight: bold;
}

.empty-message {
  padding: 12px;
  background: #dff6ff;
  border-radius: 6px;
}
``
  
</style>
</head>

<body>

<div class="container">
<h1>ECS Facilities Hire Request</h1>

<!-- CLUSTER -->
<fieldset>
  <legend>Cluster / Area</legend>
  <select id="clusterSelect">
    <option value="">Cluster Loading…</option>
  </select>
</fieldset>

<!-- SCHOOL -->
<div id="schoolSection" class="section">
  <fieldset>
    <legend>Establishment</legend>
    <select id="schoolSelect">
        <option value="">School Loading…</option>
          </select>
  </fieldset>
</div>

<!-- FACILITIES -->
<div id="facilitySection" class="section">
  <fieldset>
    <legend>Facilities Available</legend>
    <div id="facilityTiles" class="tiles"></div>
  </fieldset>
</div>

<button type="submit">Submit Application</button>
</div>

  <!-- TIME SLOTS -->
<div id="timeSlotsSection" class="section">
  <h2>Time Slots</h2>

  <div id="timeSlotsContent">
    <p class="empty-message">
      No time slots added. Click “Add another time slot” below.
    </p>
  </div>

  <button type="button" id="addSlotBtn">+ Add another time slot</button>
</div>
  
<script>
  let selectedFacility = null;
const FLOW_URL = "https://defaultfed993064d2d4409959dd0edb7304a.0b.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4cd48f8af3c54031bbd48566882f743e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=K1MDVTz9REAxJjsPeW9JqZnCFw2jR-6IaFXtqOwnSWA";

/* ================= LOAD CLUSTERS ================= */
async function loadClusters() {
  const res = await fetch(FLOW_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "getClusters" })
  });

  const data = await res.json();
  const select = document.getElementById("clusterSelect");

  // Find the array
  let clusters = data.clusters || data;
  if (!Array.isArray(clusters)) clusters = [];

  // 1. ✅ SORT CLUSTERS (ASCENDING A-Z)
  clusters.sort((a, b) => {
    // Determine the string name for 'a' and 'b'
    const nameA = typeof a === "string" ? a : a?.cluster || "";
    const nameB = typeof b === "string" ? b : b?.cluster || "";
    
    // Compare alphabetically
    return nameA.localeCompare(nameB);
  });

  // 2. Reset the dropdown
  select.innerHTML = `<option value="">Select cluster</option>`;

  // 3. Loop through sorted items
  clusters.forEach(item => {
    const clusterName = typeof item === "string" ? item : item?.cluster;

    // ✅ HARD FILTER (MANDATORY)
    if (
      typeof clusterName !== "string" ||
      clusterName.trim() === "" ||
      clusterName === "#N/A"
    ) {
      return;
    }

    select.innerHTML += `<option value="${clusterName}">${clusterName}</option>`;
  });
}

/* ================= LOAD SCHOOLS ================= */
async function loadSchools(cluster) {
  const res = await fetch(FLOW_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "getSchools", cluster })
  });

  const data = await res.json(); 
  const select = document.getElementById("schoolSelect");

  // 1. Sort data.schools in ASCENDING order (A-Z)
  // We use a.schools.localeCompare(b.schools) for A-Z
  data.schools.sort((a, b) => a.schools.localeCompare(b.schools));

  // 2. Reset the dropdown
  select.innerHTML = `<option value="">Select establishment</option>`;

  // 3. Loop through sorted data.schools
  data.schools.forEach(s => {
    select.innerHTML += `<option value="${s.schools}">${s.schools}</option>`;
  }); 

  document.getElementById("schoolSection").style.display = "block";
}


/* ================= LOAD FACILITIES ================= */
async function loadFacilities(cluster, school) {
  const res = await fetch(FLOW_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "getFacilities", cluster, school })
  });

  const data = await res.json();
  const container = document.getElementById("facilityTiles");

  container.innerHTML = "";
  data.facilities.forEach(f => {
    const tile = document.createElement("label");
    tile.className = "tile";
    tile.innerHTML = `
  <input type="checkbox" value="${f.facility}">
  <h3>${f.facility}</h3>
  <div class="rate">£${f.rate} / hour</div>

  <div class="timeslots" style="display:none">
    <strong>Booking time slots</strong>

    <div class="slots"></div>

    <button type="button" class="add-slot">Add time slot</button>
  </div>
`;

  tile.addEventListener("click", () => {
  const isSelected = tile.classList.toggle("selected");

  // Deselect logic
  if (!isSelected) {
    selectedFacility = null;
    document.getElementById("timeSlotsSection").style.display = "none";
    document.getElementById("timeSlotsContent").innerHTML =
      `<p class="empty-message">
        No time slots added. Click “Add another time slot” below.
       </p>`;
    return;
  }

  // Deselect all other tiles
  document.querySelectorAll(".tile.selected").forEach(t => {
    if (t !== tile) t.classList.remove("selected");
  });

  // Select this facility
  selectedFacility = f.facility;

  document.getElementById("timeSlotsSection").style.display = "block";
});


/* ================= EVENTS ================= */
document.getElementById("clusterSelect").addEventListener("change", e => {
  document.getElementById("schoolSection").style.display = "none";
  document.getElementById("facilitySection").style.display = "none";
  if (e.target.value) loadSchools(e.target.value);
});

document.getElementById("schoolSelect").addEventListener("change", e => {
  document.getElementById("facilitySection").style.display = "none";
  if (e.target.value) {
    loadFacilities(
      document.getElementById("clusterSelect").value,
      e.target.value
    );
  }
});

    function addTimeSlot() {
  if (!selectedFacility) return;

  const container = document.getElementById("timeSlotsContent");
  const emptyMsg = container.querySelector(".empty-message");
  if (emptyMsg) emptyMsg.remove();

  const row = document.createElement("div");
  row.className = "timeslot-row";

  row.innerHTML = `
    <input type="date">
    <input type="time">
    <input type="date">
    <input type="time">
    <button type="button">🗑 Remove</button>
  `;

  row.querySelector("button").addEventListener("click", () => {
    row.remove();
    if (!container.querySelector(".timeslot-row")) {
      container.innerHTML =
        `<p class="empty-message">
          No time slots added. Click “Add another time slot” below.
         </p>`;
    }
  });

  container.appendChild(row);
}
/* INIT */
loadClusters();
    document.getElementById("addSlotBtn").addEventListener("click", addTimeSlot)
</script>

</body>
</html>
